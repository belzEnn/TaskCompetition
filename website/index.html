<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Домашні змагання</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a; color: #f8fafc;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .login-box {
            background: #1e293b; padding: 2.5rem; border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; border: 1px solid #38bdf8;
        }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 0.5rem;
            border: 1px solid #475569; background: #0f172a; color: white; font-size: 1.1rem; box-sizing: border-box;
        }
        button {
            width: 100%; background: #10b981; color: black; border: none;
            padding: 12px; border-radius: 0.5rem; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #059669; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🐷 Домашні Змагання</h1>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Введи свій нікнейм..." required>
            <button type="submit">Увірватися в гру!</button>
        </form>
    </div>
</body>
</html>
